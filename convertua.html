<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Convert Facebook UA → Chrome Mobile</title>
<style>
body{
font-family:Arial;
background:#f2f3f5;
padding:40px;
}
.container{
max-width:900px;
margin:auto;
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
textarea{
width:100%;
height:120px;
padding:10px;
margin-top:10px;
margin-bottom:15px;
font-size:14px;
}
button{
background:#1877f2;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-size:15px;
}
button:hover{
background:#166fe5;
}
</style>
</head>

<body>

<div class="container">

<h2>Convert Facebook UA → Chrome Mobile</h2>

<label>Facebook UA</label>
<textarea id="inputUA" placeholder="Paste UA Facebook Mobile"></textarea>

<button onclick="convertUA()">Convert</button>

<label>Chrome UA</label>
<textarea id="outputUA"></textarea>

</div>

<script>

function convertUA(){

let ua = document.getElementById("inputUA").value

// remove facebook tokens
ua = ua.replace(/\s*\[FB.*?\]/g,'')

// remove webview flag
ua = ua.replace("; wv","")

// remove Version/4.0
ua = ua.replace(/Version\/[\d\.]+\s*/g,"")

// ANDROID
if(ua.includes("Android"))
{
let modelMatch = ua.match(/;\s([^;]+)\sBuild/)
let model = modelMatch ? modelMatch[1] : "Pixel 7"

ua = `Mozilla/5.0 (Linux; Android 13; ${model}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/142.0.0.0 Mobile Safari/537.36`
}

// IPHONE
else if(ua.includes("iPhone"))
{
let osMatch = ua.match(/iPhone OS ([\d_]+)/)
let os = osMatch ? osMatch[1] : "17_0"

ua = `Mozilla/5.0 (iPhone; CPU iPhone OS ${os} like Mac OS X) AppleWebKit/537.36 (KHTML, like Gecko) CriOS/142.0.0.0 Mobile/15E148 Safari/604.1`
}

document.getElementById("outputUA").value = ua.trim()

}

</script>

</body>
</html>
